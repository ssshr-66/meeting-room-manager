<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能会议室预约管理系统</title>

    <link rel="stylesheet" href="/styles/base/reset.css">
    <link rel="stylesheet" href="/styles/base/variables.css">
    <link rel="stylesheet" href="/styles/base/global.css">
    <link rel="stylesheet" href="/styles/components/button.css">
    <link rel="stylesheet" href="/styles/components/header.css">
    <link rel="stylesheet" href="/styles/components/notify.css">
    <link rel="stylesheet" href="/styles/components/modal.css">
    <link rel="stylesheet" href="/styles/pages/index.css">
</head>
<body>
    <header id="appHeader"></header>

    <main class="page-home">
        <section class="hero">
            <h1 class="hero__title">智能会议室预约管理系统</h1>
            <p class="hero__subtitle">在线预约、智能审批、会议签到、使用统计 —— 让会议资源更高效</p>
            <div class="hero__actions" id="heroActions"></div>
        </section>

        <section class="home-grid">
            <div class="card home-card">
                <h3 class="home-card__title">📢 最新公告</h3>
                <ul class="notice-list" id="noticeList">
                    <li class="text-tertiary">加载中…</li>
                </ul>
            </div>

            <div class="card home-card">
                <h3 class="home-card__title">🕒 即将到来的会议</h3>
                <ul class="meeting-list" id="upcomingList">
                    <li class="text-tertiary">登录后查看您的即将开始的会议</li>
                </ul>
            </div>

            <div class="card home-card">
                <h3 class="home-card__title">⚡ 快捷入口</h3>
                <div class="quick-links">
                    <a class="quick-link" href="/pages/room/room-list.html">🏢 浏览会议室</a>
                    <a class="quick-link" href="/pages/reservation/my-reservations.html">📋 我的预约</a>
                    <a class="quick-link" href="/pages/meeting/meeting-list.html">📝 我的会议</a>
                    <a class="quick-link" href="/pages/user/profile.html">👤 个人中心</a>
                </div>
            </div>
        </section>
    </main>

    <!-- 公共脚本（顺序固定）-->
    <script src="/scripts/common/constants.js" defer></script>
    <script src="/scripts/common/storage.js" defer></script>
    <script src="/scripts/common/auth.js" defer></script>
    <script src="/scripts/common/format.js" defer></script>
    <script src="/scripts/common/notify.js" defer></script>
    <script src="/scripts/common/modal.js" defer></script>
    <!-- ===== Mock 层（演示用，关闭：MR.Mock.enabled=false） ===== -->
    <script src="/scripts/mock/mock-config.js" defer></script>
    <script src="/scripts/mock/mock-data.js" defer></script>
    <script src="/scripts/mock/mock-helpers.js" defer></script>
    <script src="/scripts/mock/handlers/auth.js" defer></script>
    <script src="/scripts/mock/handlers/user.js" defer></script>
    <script src="/scripts/mock/handlers/room.js" defer></script>
    <script src="/scripts/mock/handlers/reservation.js" defer></script>
    <script src="/scripts/mock/handlers/approval.js" defer></script>
    <script src="/scripts/mock/handlers/meeting.js" defer></script>
    <script src="/scripts/mock/handlers/notice.js" defer></script>
    <script src="/scripts/mock/handlers/statistic.js" defer></script>
    <script src="/scripts/mock/mock-router.js" defer></script>
    <script src="/scripts/api/request.js" defer></script>
    <script src="/scripts/api/auth-api.js" defer></script>
    <script src="/scripts/api/user-api.js" defer></script>
    <script src="/scripts/api/room-api.js" defer></script>
    <script src="/scripts/api/reservation-api.js" defer></script>
    <script src="/scripts/api/notice-api.js" defer></script>
    <script src="/scripts/components/header.js" defer></script>
    <script src="/scripts/pages/index.js" defer></script>
</body>
</html>
