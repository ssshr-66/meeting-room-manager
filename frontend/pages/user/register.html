<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智能会议室预约管理系统</title>

    <link rel="stylesheet" href="/styles/base/reset.css">
    <link rel="stylesheet" href="/styles/base/variables.css">
    <link rel="stylesheet" href="/styles/base/global.css">
    <link rel="stylesheet" href="/styles/components/button.css">
    <link rel="stylesheet" href="/styles/components/form.css">
    <link rel="stylesheet" href="/styles/components/notify.css">
    <link rel="stylesheet" href="/styles/pages/login.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-card" style="max-width: 480px;">
            <div class="auth-card__brand">
                <span class="auth-card__logo">📅</span>
                <h1 class="auth-card__title">创建新账号</h1>
                <p class="auth-card__subtitle">企业员工请使用真实工号 / 邮箱</p>
            </div>

            <form id="regForm" class="mr-form" autocomplete="off">
                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">用户名（登录名）</label>
                    <input class="mr-input" type="text" name="username" placeholder="3-32 位字母数字下划线">
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">密码</label>
                    <input class="mr-input" type="password" name="password" placeholder="6-32 位">
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">昵称 / 姓名</label>
                    <input class="mr-input" type="text" name="nickname" placeholder="真实姓名">
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">邮箱</label>
                    <input class="mr-input" type="email" name="email" placeholder="example@company.com">
                </div>

                <div class="mr-form__row mr-form__row--inline">
                    <div style="flex:1">
                        <label class="mr-form__label">工号</label>
                        <input class="mr-input" type="text" name="employeeNo" placeholder="选填">
                    </div>
                    <div style="flex:1">
                        <label class="mr-form__label">手机号</label>
                        <input class="mr-input" type="text" name="phone" placeholder="选填">
                    </div>
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label">部门</label>
                    <input class="mr-input" type="text" name="department" placeholder="选填">
                </div>

                <div class="mr-form__error" id="regError"></div>

                <button class="btn btn--block" type="submit" id="regBtn">注册</button>
            </form>

            <div class="auth-card__footer">
                <a href="/pages/user/login.html">已有账号？登录</a>
                <a href="/">返回首页</a>
            </div>
        </div>
    </main>

    <script src="/scripts/common/constants.js" defer></script>
    <script src="/scripts/common/storage.js" defer></script>
    <script src="/scripts/common/auth.js" defer></script>
    <script src="/scripts/common/format.js" defer></script>
    <script src="/scripts/common/notify.js" defer></script>
    <script src="/scripts/api/request.js" defer></script>
    <script src="/scripts/api/auth-api.js" defer></script>
    <script src="/scripts/pages/register.js" defer></script>
</body>
</html>
