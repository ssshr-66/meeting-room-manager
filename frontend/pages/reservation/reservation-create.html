<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建预约 - 智能会议室预约管理系统</title>

    <link rel="stylesheet" href="/styles/base/reset.css">
    <link rel="stylesheet" href="/styles/base/variables.css">
    <link rel="stylesheet" href="/styles/base/global.css">
    <link rel="stylesheet" href="/styles/components/header.css">
    <link rel="stylesheet" href="/styles/components/button.css">
    <link rel="stylesheet" href="/styles/components/form.css">
    <link rel="stylesheet" href="/styles/components/notify.css">
    <link rel="stylesheet" href="/styles/pages/reservation-create.css">
</head>
<body>
    <header id="appHeader"></header>

    <main class="page-container">
        <h2 class="page-title">创建会议预约</h2>
        <p class="page-subtitle">选择会议室与时段，填写会议信息后提交</p>

        <div class="reservation-layout">
            <form id="resForm" class="card mr-form reservation-form" autocomplete="off">
                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">会议室</label>
                    <select class="mr-select" name="roomId" id="roomSel">
                        <option value="">加载中...</option>
                    </select>
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">会议主题</label>
                    <input class="mr-input" type="text" name="title" placeholder="例：产品周会" maxlength="128">
                </div>

                <div class="mr-form__row mr-form__row--inline">
                    <div style="flex:1">
                        <label class="mr-form__label mr-form__label--required">开始时间</label>
                        <input class="mr-input" type="datetime-local" name="startTime">
                    </div>
                    <div style="flex:1">
                        <label class="mr-form__label mr-form__label--required">结束时间</label>
                        <input class="mr-input" type="datetime-local" name="endTime">
                    </div>
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label mr-form__label--required">参会人数</label>
                    <input class="mr-input" type="number" name="attendeeCount" min="1" max="500" value="5">
                </div>

                <div class="mr-form__row">
                    <label class="mr-form__label">会议描述</label>
                    <textarea class="mr-textarea" name="description" maxlength="500" placeholder="选填，最多 500 字"></textarea>
                </div>

                <div class="mr-form__error" id="resError"></div>

                <div class="flex-end">
                    <a class="btn btn--ghost" href="/pages/room/room-list.html">取消</a>
                    <button class="btn" type="submit" id="submitBtn">提交预约</button>
                </div>
            </form>

            <aside class="card room-summary" id="roomSummary">
                <div class="state-block">请选择会议室</div>
            </aside>
        </div>
    </main>

    <script src="/scripts/common/constants.js" defer></script>
    <script src="/scripts/common/storage.js" defer></script>
    <script src="/scripts/common/auth.js" defer></script>
    <script src="/scripts/common/format.js" defer></script>
    <script src="/scripts/common/notify.js" defer></script>
    <!-- ===== Mock 层（演示用，关闭：MR.Mock.enabled=false） ===== -->
    <script src="/scripts/mock/mock-config.js" defer></script>
    <script src="/scripts/mock/mock-data.js" defer></script>
    <script src="/scripts/mock/mock-helpers.js" defer></script>
    <script src="/scripts/mock/handlers/auth.js" defer></script>
    <script src="/scripts/mock/handlers/user.js" defer></script>
    <script src="/scripts/mock/handlers/room.js" defer></script>
    <script src="/scripts/mock/handlers/reservation.js" defer></script>
    <script src="/scripts/mock/handlers/approval.js" defer></script>
    <script src="/scripts/mock/handlers/meeting.js" defer></script>
    <script src="/scripts/mock/handlers/notice.js" defer></script>
    <script src="/scripts/mock/handlers/statistic.js" defer></script>
    <script src="/scripts/mock/mock-router.js" defer></script>
    <script src="/scripts/api/request.js" defer></script>
    <script src="/scripts/api/room-api.js" defer></script>
    <script src="/scripts/api/reservation-api.js" defer></script>
    <script src="/scripts/components/header.js" defer></script>
    <script src="/scripts/pages/reservation-create.js" defer></script>
</body>
</html>
